---
name: CodeQL

on:
  workflow_call:
    inputs:

      # General or common inputs.
      working-directory:
        description: 'The working directory for this project.'
        required: false
        type: string
        default: .

jobs:
  codeql:
    name: Analyze via CodeQL
    runs-on: [ ubuntu-latest ]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Dump context
        uses: crazy-max/ghaction-dump-context@4d9eeaf15dd59aa4346919ea84a84ccf514b4db8 # v3.1.0

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          source-root: ${{ inputs.working-directory }}
          languages: 'go'

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
