---
name: CodeQL

on:
  workflow_call:
    inputs:

      # General or common inputs.
      working-directory:
        description: 'The working directory for this project.'
        required: false
        type: string
        default: .

jobs:
  codeql:
    name: Analyze via CodeQL
    runs-on: [ ubuntu-latest ]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Dump context
        uses: crazy-max/ghaction-dump-context@5d2753e7076f4568c7729971e25231f32147e2d8 # v3.0.0

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          source-root: ${{ inputs.working-directory }}
          languages: 'go'

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
